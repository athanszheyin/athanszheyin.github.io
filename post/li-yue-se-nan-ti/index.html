            <div class="post-content">
              <p>李约瑟难题并非单纯是一个历史科目的学术问题，它更像是海棠无香，鲥鱼多刺，红楼未完式的遗憾，时时叩问着每个中国人的内心。在人类文明发展中领先了一千多年的天朝何以在近两百年迅速掉队，所谓的修昔底德陷阱，先发优势等等定律统统失效。撇开意识形态不谈，由封建阶级进入资本阶级，由农业社会进入工业社会，由人本制度进入法治制度，中国现在到底是迎头赶上还是渐行渐远？</p>
