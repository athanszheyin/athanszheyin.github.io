                  <p>长久以来我一直对韩国电影所取得的艺术成就感到羡慕和惊讶，同样是东亚电影，为什么韩国电影能像日本足球一样吊打东亚另外两国（尤其是中国）。今日看完《寄生虫》之后得到了一些启示，能诞生这么好的剧本，是因为社会分层，阶级分化在韩国在摆在台面上的话题，是全民都承认并且讨论的话题。而这样的分化，往往会带来致命的社会问题。</p>
